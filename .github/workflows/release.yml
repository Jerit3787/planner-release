# Desktop release workflow for Student Planner.
#
# The app code lives in the PRIVATE `Jerit3787/planner` repo; this public repo
# only hosts the built releases (so end users and the updater can download them).
# This workflow checks out planner's code with a PAT, builds the Tauri desktop
# app on each platform, and publishes signed installers + the updater manifest
# (latest.json) as a release HERE — which is what the updater endpoint in
# planner's tauri.conf.json points at.
#
# Run it from the Actions tab ("Run workflow"), choosing the planner branch/tag
# to build (defaults to `dev`, planner's production branch). The release version
# comes from planner's own package.json, so bump that in planner first.
#
# Required secrets on THIS repo:
#   PLANNER_PAT                          fine-grained PAT, contents:read on Jerit3787/planner
#   TAURI_SIGNING_PRIVATE_KEY            updater signing key (same keypair whose public
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   half is committed in planner's tauri.conf.json)

name: Release
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'planner branch or tag to build'
        default: dev
        required: true
      desktop:
        description: 'Build the desktop installers (uncheck to re-run Android only against the existing release)'
        type: boolean
        default: true

permissions:
  contents: write            # create the release on this (planner-release) repo

jobs:
  release:
    if: ${{ inputs.desktop }}
    strategy:
      fail-fast: false
      max-parallel: 1        # serialize so tauri-action's latest.json updates don't race
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon + Intel via the universal target
            arch: universal
            args: '--target universal-apple-darwin'
          - platform: ubuntu-latest     # x86_64
            arch: x64
            args: ''
          # ubuntu-24.04-arm is a GitHub-hosted runner (free for public repos) —
          # a NATIVE arm64 build, not a cross-compile, so no extra toolchain/
          # sysroot juggling for WebKitGTK's native deps (planner issue #238).
          - platform: ubuntu-24.04-arm  # aarch64
            arch: arm64
            args: ''
          - platform: windows-latest    # x86_64
            arch: x64
            args: ''
          # No GitHub-hosted arm64 Windows runner available on this plan, so this
          # cross-compiles instead — MSVC's toolchain has first-class arm64 cross
          # -compile support, unlike GCC/Linux's, so this is the tractable side to
          # cross-compile rather than trying to source arm64 Windows hardware.
          - platform: windows-latest    # arm64 (cross-compiled)
            arch: arm64
            args: '--target aarch64-pc-windows-msvc'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout the private planner code
        uses: actions/checkout@v4
        with:
          repository: Jerit3787/planner
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PLANNER_PAT }}

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'            # cache the npm download store, keyed on package-lock.json

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || (matrix.args == '--target aarch64-pc-windows-msvc' && 'aarch64-pc-windows-msvc' || '') }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true  # keep the cache even when a build fails, so re-runs are fast

      - name: Install Linux system dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev xdg-utils

      - name: Install app dependencies
        run: npm ci

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS/Windows code signing intentionally NOT wired yet (unsigned build).
        with:
          args: ${{ matrix.args }}
          tagName: v__VERSION__ # tauri-action replaces __VERSION__ with planner's app version
          releaseName: 'Student Planner v__VERSION__'
          releaseBody: 'Desktop build of Student Planner. Download the installer for your platform below; installed copies auto-update from future releases.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  # Builds the Android APK and attaches it to the same release the desktop job
  # created above. NOTE: without a release keystore this produces a DEBUG-signed
  # APK — installable by sideloading, but it can't auto-update over itself (CI's
  # debug key differs per build, so Android rejects the update). Add an
  # ANDROID_KEYSTORE_BASE64 (+ passwords) secret and wire release signing to make
  # the in-app updater actually work; until then this is a downloadable preview.
  android:
    needs: release
    # Runs after the desktop release, or on its own when `desktop` is unchecked
    # (release skipped) — but not if the desktop build actually failed.
    if: ${{ always() && needs.release.result != 'failure' && needs.release.result != 'cancelled' }}
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: '26.3.11579264'
    steps:
      - name: Checkout the private planner code
        uses: actions/checkout@v4
        with:
          repository: Jerit3787/planner
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PLANNER_PAT }}

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'            # cache the npm download store, keyed on package-lock.json

      - name: Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          # No `cache: gradle` here — the Gradle project doesn't exist until
          # `tauri android init` runs later, so setup-java's cache step fails at
          # this point with "No file matched ... gradle*" (planner issue: Android
          # release build failed). Gradle deps are still cached via the Rust/NDK
          # caches + the runner's own tooling.

      - name: Android SDK setup
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}

      - name: Install Android NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Rust setup (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true  # keep the cache even when a build fails, so re-runs are fast

      - name: Install app dependencies
        run: npm ci

      - name: Initialize the Android project
        run: npm run tauri android init

      # `tauri icon` only writes straight into gen/android/app/src/main/res/ if
      # that directory ALREADY EXISTS at the moment it runs (see tauri-cli's own
      # icon.rs) — otherwise it falls back to a standalone src-tauri/icons/android/
      # folder that nothing ever automatically consumes. Since gen/android didn't
      # exist yet on the machine that originally generated icons/android/ (a local
      # dev machine, not CI), those regenerated icons landed in that inert
      # fallback location and every CI build kept silently using Tauri's own
      # placeholder template icon instead (confirmed live: v2.126.8's real
      # released APK still had it). tauri android init (just above) always
      # regenerates gen/android fresh, so this copies the actual generated icons
      # over the freshly-created project's placeholders every single build.
      - name: Apply the app's own Android launcher icon
        run: cp -R src-tauri/icons/android/. src-tauri/gen/android/app/src/main/res/

      # Adds REQUEST_INSTALL_PACKAGES (needed for the in-app updater to launch the
      # system installer on the downloaded APK), patches MainActivity.kt so the
      # status bar/nav bar don't render over app content (planner issue #242 —
      # Tauri's own template calls enableEdgeToEdge() at targetSdk 36, which
      # makes edge-to-edge mandatory with no manifest opt-out; confirmed live
      # that without this, system bar icons and the 3-button nav bar sat
      # directly on top of the topbar and the FAB/bottom buttons), and, when
      # the keystore secret is present, wires real release signing into the
      # generated Gradle project so updates can install over each other
      # (debug-signed APKs can't — the key differs per build). Falls back to
      # a debug build when no keystore is set.
      - name: Configure the Android project (install permission + insets + signing)
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          GEN=src-tauri/gen/android
          MANIFEST="$GEN/app/src/main/AndroidManifest.xml"
          IDENTIFIER="$(node -p "require('./src-tauri/tauri.conf.json').identifier")"
          MAIN_ACTIVITY="$GEN/app/src/main/java/$(echo "$IDENTIFIER" | tr '.' '/')/MainActivity.kt"

          # 1) install permission (idempotent) so the updater can launch the installer
          if ! grep -q 'REQUEST_INSTALL_PACKAGES' "$MANIFEST"; then
            perl -0pi -e 's/(<manifest[^>]*>)/$1\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" \/>/' "$MANIFEST"
          fi

          # 2) system-bar insets (idempotent — see patch-android-insets.py)
          python3 src-tauri/scripts/patch-android-insets.py "$MAIN_ACTIVITY"

          # 3) release signing — only if the keystore secret is provided
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret — building a DEBUG apk."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GEN/release.jks"
          {
            echo "storeFile=$(pwd)/$GEN/release.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > "$GEN/keystore.properties"

          python3 src-tauri/scripts/patch-android-signing.py "$GEN/app/build.gradle.kts"
          echo "Release signing configured."
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build the Android APK
        run: |
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            npm run tauri android build -- --apk
          else
            npm run tauri android build -- --apk --debug
          fi

      - name: Collect and rename the APK(s)
        id: apk
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          SUFFIX="$([ "${{ steps.signing.outputs.signed }}" = "true" ] && echo release || echo debug)"
          mkdir -p android-out
          i=0
          while IFS= read -r f; do
            arch="$(basename "$(dirname "$(dirname "$f")")")"   # .../apk/<arch>/<buildtype>/x.apk
            cp "$f" "android-out/student-planner_${VERSION}_${arch:-android}-${SUFFIX}.apk"
            i=$((i+1))
          done < <(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk')
          echo "count=$i"
          ls -la android-out

      - name: Attach the APK(s) to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.apk.outputs.tag }}" android-out/*.apk --repo Jerit3787/planner-release --clobber

  # Once every asset (desktop + Android) is on the release, rewrite the release
  # notes with a curated download table + SHA-256 checksums so users can verify
  # their download. Runs after Android (the last asset-producing job).
  finalize:
    needs: [release, android]
    if: ${{ always() && needs.android.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the private planner code
        uses: actions/checkout@v4
        with:
          repository: Jerit3787/planner
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PLANNER_PAT }}

      - name: Resolve version tag
        id: v
        run: echo "tag=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Download the release's assets (to hash them)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p rel-assets
          gh release download "${{ steps.v.outputs.tag }}" \
            --repo Jerit3787/planner-release --dir rel-assets

      - name: Generate and apply the release notes (with checksums)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(jq -r .version package.json)"
          python3 src-tauri/scripts/gen-release-notes.py \
            "$VER" rel-assets Jerit3787/planner-release > body.md
          echo "----- generated body -----"; cat body.md
          gh release edit "${{ steps.v.outputs.tag }}" \
            --repo Jerit3787/planner-release --notes-file body.md
