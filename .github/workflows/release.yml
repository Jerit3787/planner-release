# Desktop release workflow for Student Planner.
#
# The app code lives in the PRIVATE `Jerit3787/planner` repo; this public repo
# only hosts the built releases (so end users and the updater can download them).
# This workflow checks out planner's code with a PAT, builds the Tauri desktop
# app on each platform, and publishes signed installers + the updater manifest
# (latest.json) as a release HERE — which is what the updater endpoint in
# planner's tauri.conf.json points at.
#
# Run it from the Actions tab ("Run workflow"), choosing the planner branch/tag
# to build (defaults to `dev`, planner's production branch). The release version
# comes from planner's own package.json, so bump that in planner first.
#
# Required secrets on THIS repo:
#   PLANNER_PAT                          fine-grained PAT, contents:read on Jerit3787/planner
#   TAURI_SIGNING_PRIVATE_KEY            updater signing key (same keypair whose public
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   half is committed in planner's tauri.conf.json)

name: Release
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'planner branch or tag to build'
        default: dev
        required: true
      desktop:
        description: 'Build the desktop installers (uncheck to re-run the Android AAB build only)'
        type: boolean
        default: true

permissions:
  contents: write            # create the release on this (planner-release) repo

jobs:
  # Creates (or, when `desktop` is unchecked, resolves) the GitHub release that
  # every other job uploads assets to. Pulled out into its own job so the
  # desktop matrix and the android job can both depend on THIS instead of
  # android depending on the desktop matrix finishing first — that's what
  # actually let the two build in parallel instead of android waiting behind
  # all 5 desktop platforms (user-requested: "build android also together").
  # tauri-action's own release-creation (used by each matrix job below) is
  # given this job's releaseId instead, so it uploads to the release created
  # here rather than each matrix job racing to create its own.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.rel.outputs.release_id }}
      tag: ${{ steps.rel.outputs.tag }}
    steps:
      - name: Checkout the private planner code
        uses: actions/checkout@v7
        with:
          repository: Jerit3787/planner
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PLANNER_PAT }}

      - name: Ensure the GitHub release exists and resolve its numeric id
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # tauri-action's own tagName (v__VERSION__ below) is substituted from
          # src-tauri/tauri.conf.json's version, NOT package.json's — the two
          # can genuinely diverge (package.json bumps on every web-only deploy;
          # tauri.conf.json/Cargo.toml only bump for an actual native release).
          # A real, live-hit bug from exactly this mismatch: package.json was at
          # 2.126.49 while tauri.conf.json was still 2.126.47, so tauri-action
          # published under tag v2.126.47 while this job (and the embed-widget/
          # android steps, now all fixed to match) computed v2.126.49 — "release
          # not found" on upload. Read tauri.conf.json here to match.
          VERSION="$(jq -r .version src-tauri/tauri.conf.json)"
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if gh release view "$TAG" --repo Jerit3787/planner-release >/dev/null 2>&1; then
            echo "Release $TAG already exists — reusing it (desktop unchecked, or a repair re-run)."
          else
            echo "Release $TAG doesn't exist yet — creating it so desktop + android can upload in parallel."
            # No --target: the checked-out HEAD here is planner's (the private
            # source repo), not a valid commitish in planner-release (the repo
            # this release actually belongs to) — passing it made GitHub
            # reject the request outright ("Release.target_commitish is
            # invalid"). Omitting it defaults to planner-release's own default
            # branch, which is fine: the tag is just a version label here, no
            # real source tree in planner-release needs to correspond to it.
            gh release create "$TAG" \
              --repo Jerit3787/planner-release \
              --title "Student Planner $TAG" \
              --notes "Desktop build of Student Planner. Download the installer for your platform below; installed copies auto-update from future releases."
          fi

          RELEASE_ID="$(gh api repos/Jerit3787/planner-release/releases/tags/$TAG --jq .id)"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  release:
    needs: create-release
    if: ${{ inputs.desktop }}
    strategy:
      fail-fast: false
      # Was max-parallel: 1 (serialized, one platform at a time) — added
      # defensively against tauri-action's own latest.json (the updater
      # manifest) potentially racing if two matrix jobs read-modify-wrote it
      # concurrently. Removed to actually build in parallel (user-requested,
      # and this repo's own 5-way matrix serialized was taking ~35-40min wall
      # clock for what could be a single job's worth of time) — this matches
      # Tauri's own official example workflow (v2.tauri.app/distribute/
      # pipelines/github/), which runs its multi-platform matrix fully in
      # parallel with no serialization at all, so tauri-action is expected to
      # handle concurrent uploads to the same release safely. If latest.json
      # ever turns up missing an entry for some platform after a release
      # (the one real failure mode this was guarding against), that's the
      # first thing to check — re-running just the affected platform's job
      # against the existing release/tag should repair it without needing to
      # rebuild everything.
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon + Intel via the universal target
            arch: universal
            args: '--target universal-apple-darwin'
          - platform: ubuntu-latest     # x86_64
            arch: x64
            args: ''
          # ubuntu-24.04-arm is a GitHub-hosted runner (free for public repos) —
          # a NATIVE arm64 build, not a cross-compile, so no extra toolchain/
          # sysroot juggling for WebKitGTK's native deps (planner issue #238).
          - platform: ubuntu-24.04-arm  # aarch64
            arch: arm64
            args: ''
          - platform: windows-latest    # x86_64
            arch: x64
            args: ''
          # No GitHub-hosted arm64 Windows runner available on this plan, so this
          # cross-compiles instead — MSVC's toolchain has first-class arm64 cross
          # -compile support, unlike GCC/Linux's, so this is the tractable side to
          # cross-compile rather than trying to source arm64 Windows hardware.
          - platform: windows-latest    # arm64 (cross-compiled)
            arch: arm64
            args: '--target aarch64-pc-windows-msvc'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout the private planner code
        uses: actions/checkout@v7
        with:
          repository: Jerit3787/planner
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PLANNER_PAT }}

      - name: Node.js setup
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'            # cache the npm download store, keyed on package-lock.json

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || (matrix.args == '--target aarch64-pc-windows-msvc' && 'aarch64-pc-windows-msvc' || '') }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true  # keep the cache even when a build fails, so re-runs are fast

      - name: Install Linux system dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev xdg-utils

      # macOS home-screen widget (real WidgetKit, not just a floating window —
      # see src-tauri/macos-widget/) — its Xcode project is generated by
      # xcodegen, called from build-widget.sh via tauri.conf.json's
      # beforeBundleCommand (tauri.macos.conf.json, merged in automatically
      # for this platform). GitHub's macos-latest runners have Homebrew
      # preinstalled, so this is just one more formula.
      - name: Install xcodegen (macOS widget only)
        if: matrix.platform == 'macos-latest'
        run: brew install xcodegen

      - name: Install app dependencies
        run: npm ci

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS/Windows code signing intentionally NOT wired yet (unsigned build).
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }} # upload to the release create-release already made, don't race creating a new one per matrix job
          args: ${{ matrix.args }}
          tagName: v__VERSION__ # tauri-action replaces __VERSION__ with planner's app version
          releaseName: 'Student Planner v__VERSION__'
          releaseBody: 'Desktop build of Student Planner. Download the installer for your platform below; installed copies auto-update from future releases.'
          releaseDraft: false
          prerelease: false
          # Renamed by a newer tauri-action release - was includeUpdaterJson,
          # which now just produces a harmless "Unexpected input(s)" warning
          # on every run (the updater artifacts still got uploaded regardless,
          # since uploadUpdaterJson defaults to true either way - but worth
          # fixing so the warning stops rather than relying on that default).
          uploadUpdaterJson: true

      # tauri.macos.conf.json sets bundle.targets to ["app"] (not "dmg") so
      # Tauri's own bundler doesn't produce a DMG missing the widget — this
      # embeds the widget .appex (built by beforeBundleCommand above) into the
      # .app, ad-hoc signs it (no Apple Developer Program account — see
      # CLAUDE.md's Tauri notes), and rebuilds the DMG from that signed .app.
      # tauri-action's own release upload above ran before this existed, so
      # this step uploads/replaces it on the same release.
      - name: Embed the macOS widget and rebuild the DMG
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./src-tauri/macos-widget/embed-widget.sh
          TAG="v$(node -p "require('./src-tauri/tauri.conf.json').version")" # match tauri-action's own tag source, not package.json (see create-release job's comment)
          DMG_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          echo "Uploading rebuilt DMG: $DMG_PATH"
          gh release upload "$TAG" "$DMG_PATH" --repo Jerit3787/planner-release --clobber

  # Builds a signed Android App Bundle (.aab) for Google Play — Play requires
  # this format, not an APK. Deliberately depends only on create-release, NOT
  # on the desktop `release` matrix job, so Android keeps building at the same
  # time as desktop instead of queueing behind all 5 desktop platforms.
  # Uploaded as a workflow artifact (see the last step below), not attached to
  # the GitHub release — Play doesn't consume GitHub release assets, and there
  # is no more GitHub-distributed Android download at all (Play is the only
  # Android distribution channel now; the previous self-updating APK build
  # this job used to produce has been retired). A manual upload to Play
  # Console is expected until a Play Developer API auto-upload step is added
  # separately.
  android:
    needs: create-release
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: '26.3.11579264'
    steps:
      - name: Checkout the private planner code
        uses: actions/checkout@v7
        with:
          repository: Jerit3787/planner
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PLANNER_PAT }}

      - name: Node.js setup
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'            # cache the npm download store, keyed on package-lock.json

      - name: Java (JDK 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          # No `cache: gradle` here — the Gradle project doesn't exist until
          # `tauri android init` runs later, so setup-java's cache step fails at
          # this point with "No file matched ... gradle*" (planner issue: Android
          # release build failed). Gradle deps are still cached via the Rust/NDK
          # caches + the runner's own tooling.

      - name: Android SDK setup
        uses: android-actions/setup-android@v4

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}

      - name: Install Android NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Rust setup (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true  # keep the cache even when a build fails, so re-runs are fast

      - name: Install app dependencies
        run: npm ci

      - name: Initialize the Android project
        run: npm run tauri android init

      # `tauri icon` only writes straight into gen/android/app/src/main/res/ if
      # that directory ALREADY EXISTS at the moment it runs (see tauri-cli's own
      # icon.rs) — otherwise it falls back to a standalone src-tauri/icons/android/
      # folder that nothing ever automatically consumes. Since gen/android didn't
      # exist yet on the machine that originally generated icons/android/ (a local
      # dev machine, not CI), those regenerated icons landed in that inert
      # fallback location and every CI build kept silently using Tauri's own
      # placeholder template icon instead (confirmed live: v2.126.8's real
      # released APK still had it). tauri android init (just above) always
      # regenerates gen/android fresh, so this copies the actual generated icons
      # over the freshly-created project's placeholders every single build.
      - name: Apply the app's own Android launcher icon
        run: cp -R src-tauri/icons/android/. src-tauri/gen/android/app/src/main/res/

      # Real FCM push notifications, Android only (src-tauri/src/lib.rs
      # explains why desktop isn't in scope yet). google-services.json has to
      # live in the generated app/ dir every build (gen/android is regenerated
      # fresh each time, so it can't just be committed there), and neither
      # tauri android init nor tauri-plugin-notifications wires the
      # google-services Gradle plugin in automatically — patch-android-
      # firebase.py adds the classpath + plugin application by hand.
      - name: Wire up Firebase Cloud Messaging for Android
        run: |
          cp src-tauri/google-services.json src-tauri/gen/android/app/google-services.json
          python3 src-tauri/scripts/patch-android-firebase.py \
            src-tauri/gen/android/build.gradle.kts \
            src-tauri/gen/android/app/build.gradle.kts

      # Patches MainActivity.kt so the status bar/nav bar don't render over app
      # content (planner issue #242 — Tauri's own template calls
      # enableEdgeToEdge() at targetSdk 36, which makes edge-to-edge mandatory
      # with no manifest opt-out), and wires real release signing into the
      # generated Gradle project. Deliberately does NOT inject
      # REQUEST_INSTALL_PACKAGES (unlike this job's previous GitHub-APK
      # incarnation) — this is now a Play-only build, and Play prohibits an
      # app from updating itself via any mechanism other than Play's own.
      # Fails outright if the keystore secret is missing — Play requires a
      # signed .aab, so there's no debug fallback here.
      - name: Configure the Android project (insets + signing, no install permission)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          GEN=src-tauri/gen/android
          IDENTIFIER="$(node -p "require('./src-tauri/tauri.conf.json').identifier")"
          MAIN_ACTIVITY="$GEN/app/src/main/java/$(echo "$IDENTIFIER" | tr '.' '/')/MainActivity.kt"

          python3 src-tauri/scripts/patch-android-insets.py "$MAIN_ACTIVITY"

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is required — Play requires a signed .aab, there is no debug fallback here."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GEN/release.jks"
          {
            echo "storeFile=$(pwd)/$GEN/release.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > "$GEN/keystore.properties"

          python3 src-tauri/scripts/patch-android-signing.py "$GEN/app/build.gradle.kts"
          echo "Release signing configured."

      - name: Build the Android App Bundle
        run: npm run tauri android build -- --aab

      - name: Collect the AAB
        id: aab
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p android-play-out
          find src-tauri/gen/android/app/build/outputs/bundle -name '*.aab' \
            -exec cp {} "android-play-out/student-planner_${VERSION}.aab" \;
          ls -la android-play-out

      - name: Upload the AAB as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-play-aab
          path: android-play-out/*.aab
          if-no-files-found: error

  # Once every asset (desktop + Android) is on the release, rewrite the release
  # notes with a curated download table + SHA-256 checksums so users can verify
  # their download. Runs after Android (the last asset-producing job).
  finalize:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the private planner code
        uses: actions/checkout@v7
        with:
          repository: Jerit3787/planner
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PLANNER_PAT }}

      - name: Resolve version tag
        id: v
        run: echo "tag=v$(jq -r .version src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT" # match tauri-action's own tag source, not package.json (see create-release job's comment)

      - name: Download the release's assets (to hash them)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p rel-assets
          gh release download "${{ steps.v.outputs.tag }}" \
            --repo Jerit3787/planner-release --dir rel-assets

      - name: Generate and apply the release notes (with checksums)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(jq -r .version src-tauri/tauri.conf.json)" # match tauri-action's own tag source, not package.json (see create-release job's comment)
          python3 src-tauri/scripts/gen-release-notes.py \
            "$VER" rel-assets Jerit3787/planner-release > body.md
          echo "----- generated body -----"; cat body.md
          gh release edit "${{ steps.v.outputs.tag }}" \
            --repo Jerit3787/planner-release --notes-file body.md
